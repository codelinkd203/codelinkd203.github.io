<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="icon" type="image/x-icon" href="/assets/favicon.ico">
<title>codelinkd203 - Projects</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&family=Geist+Mono&display=swap" rel="stylesheet">

<style>

:root{
--bg:#0a0a0b;
--card:#111113;
--border:#1f1f23;
--text:#f4f4f5;
--muted:#a1a1aa;
}

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
font-family:Geist,system-ui;
background:var(--bg);
color:var(--text);
padding:60px 24px;
}

/* grid background */

body::before{
content:"";
position:fixed;
inset:0;
background-image:
linear-gradient(rgba(255,255,255,.035) 1px, transparent 1px),
linear-gradient(90deg, rgba(255,255,255,.035) 1px, transparent 1px);
background-size:42px 42px;
z-index:-1;
}

/* container */

.container{
max-width:1200px;
margin:auto;
}

/* header */

.header{
margin-bottom:40px;
}

.header h1{
font-size:38px;
letter-spacing:-.5px;
}

.subtitle{
margin-top:6px;
color:var(--muted);
font-family:"Geist Mono";
font-size:13px;
}

/* gallery */

.gallery{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(270px,1fr));
gap:26px;
}

/* links reset */

a{
text-decoration:none;
color:inherit;
}

/* card */

.card{
background:var(--card);
border:1px solid var(--border);
border-radius:18px;
overflow:hidden;
transition:.25s ease;
}

.card:hover{
transform:translateY(-6px);
box-shadow:0 18px 50px rgba(0,0,0,.6);
}

/* image */

.image{
height:180px;
overflow:hidden;
}

.image img{
width:100%;
height:100%;
object-fit:cover;
transition:transform .35s ease;
}

.card:hover img{
transform:scale(1.08);
}

/* content */

.content{
padding:18px;
}

.title{
font-size:18px;
font-weight:500;
margin-bottom:6px;
}

.desc{
font-size:13px;
font-family: "Geist Mono", sans-serif;
color:var(--muted);
line-height:1.5;
}

footer{
margin-top:60px;
text-align:center;
font-family:"Geist Mono";
color:var(--muted);
font-size:12px;
}

.backArrow{
  width:32px;
  height:32px;
  color:#9ca3af;
  cursor:pointer;
  margin-bottom:18px;
  transition: opacity 0.3s ease-in-out;
}

.githubButton{
  width:32px;
  height:32px;
  color:#9ca3af;
  cursor:pointer;
  position: fixed;
  top: 18px;
  right: 18px;
  transition: opacity 0.3s ease-in-out;
}
  
.backArrow:hover, .githubButton:hover{
  opacity: 0.2;
}

</style>

</head>
<body>

<div class="container">

<div class="header">

<svg class="githubButton" onclick="window.location.href='https://github.com/codelinkd203/codelinkd203.github.io/';" xmlns="http://www.w3.org/2000/svg" width="64" height="64" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" image-rendering="optimizeQuality" fill-rule="evenodd" clip-rule="evenodd" viewBox="0 0 640 640"><path d="M319.988 7.973C143.293 7.973 0 151.242 0 327.96c0 141.392 91.678 261.298 218.826 303.63 16.004 2.964 21.886-6.957 21.886-15.414 0-7.63-.319-32.835-.449-59.552-89.032 19.359-107.8-37.772-107.8-37.772-14.552-36.993-35.529-46.831-35.529-46.831-29.032-19.879 2.209-19.442 2.209-19.442 32.126 2.245 49.04 32.954 49.04 32.954 28.56 48.922 74.883 34.76 93.131 26.598 2.882-20.681 11.15-34.807 20.315-42.803-71.08-8.067-145.797-35.516-145.797-158.14 0-34.926 12.52-63.485 32.965-85.88-3.33-8.078-14.291-40.606 3.083-84.674 0 0 26.87-8.61 88.029 32.8 25.512-7.075 52.878-10.642 80.056-10.76 27.2.118 54.614 3.673 80.162 10.76 61.076-41.386 87.922-32.8 87.922-32.8 17.398 44.08 6.485 76.631 3.154 84.675 20.516 22.394 32.93 50.953 32.93 85.879 0 122.907-74.883 149.93-146.117 157.856 11.481 9.921 21.733 29.398 21.733 59.233 0 42.792-.366 77.28-.366 87.804 0 8.516 5.764 18.473 21.992 15.354 127.076-42.354 218.637-162.274 218.637-303.582 0-176.695-143.269-319.988-320-319.988l-.023.107z"/></svg>
  
<svg class="backArrow" onclick="history.back()" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
    <path d="M15 18L9 12L15 6" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>

<h1>Projects</h1>
<div class="subtitle">gallery of experiments</div>
</div>

<div class="gallery" id="gallery"></div>

<footer>
loaded from /projects/projects.json
</footer>

</div>

<script>

async function loadProjects(){

const gallery=document.getElementById("gallery")

const res=await fetch("/projects/projects.json")
const projects=await res.json()

projects.forEach(p=>{

const card=document.createElement("a")
card.className="card"
card.href=p.link

card.innerHTML=`

<div class="image">
<img src="${p.image}" alt="${p.name}">
</div>

<div class="content">
<div class="title">${p.name}</div>
<div class="desc">${p.desc}</div>
</div>

`

gallery.appendChild(card)

})

}

loadProjects()

</script>

</body>
</html>
