<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Projects</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&family=Geist+Mono&display=swap" rel="stylesheet">

<style>

:root{
--bg:#0a0a0b;
--card:#111113;
--border:#1f1f23;
--text:#f4f4f5;
--muted:#a1a1aa;
}

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
font-family:Geist,system-ui;
background:var(--bg);
color:var(--text);
padding:60px 24px;
}

/* grid background */

body::before{
content:"";
position:fixed;
inset:0;
background-image:
linear-gradient(rgba(255,255,255,.035) 1px, transparent 1px),
linear-gradient(90deg, rgba(255,255,255,.035) 1px, transparent 1px);
background-size:42px 42px;
z-index:-1;
}

/* container */

.container{
max-width:1200px;
margin:auto;
}

/* title */

.header{
margin-bottom:40px;
}

.header h1{
font-size:38px;
letter-spacing:-.5px;
}

.subtitle{
margin-top:6px;
color:var(--muted);
font-family:"Geist Mono";
font-size:13px;
}

/* gallery */

.gallery{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(270px,1fr));
gap:26px;
}

/* remove anchor garbage */

a{
text-decoration:none;
color:inherit;
}

/* card */

.card{
background:var(--card);
border:1px solid var(--border);
border-radius:18px;
overflow:hidden;
transition:.25s ease;
}

.card:hover{
transform:translateY(-6px);
box-shadow:0 18px 50px rgba(0,0,0,.6);
}

/* image */

.image{
position:relative;
height:170px;
overflow:hidden;
}

.image img{
width:100%;
height:100%;
object-fit:cover;
transition:transform .4s ease;
}

.card:hover img{
transform:scale(1.08);
}

/* logo box */

.logo{
position:absolute;
top:12px;
left:12px;
width:42px;
height:42px;
border-radius:12px;
background:#0f0f11;
border:1px solid var(--border);
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
}

.logo img{
width:70%;
height:70%;
object-fit:contain;
}

/* content */

.content{
padding:16px 18px 20px;
}

.title{
font-size:18px;
font-weight:500;
margin-bottom:6px;
}

.desc{
font-size:13px;
color:var(--muted);
line-height:1.5;
}

footer{
margin-top:60px;
text-align:center;
font-family:"Geist Mono";
color:var(--muted);
font-size:12px;
}

</style>

</head>
<body>

<div class="container">

<div class="header">
<h1>Projects</h1>
<div class="subtitle">gallery of experiments</div>
</div>

<div class="gallery" id="gallery"></div>

<footer>
loaded from /projects/projects.json
</footer>

</div>

<script>

async function loadProjects(){

const gallery=document.getElementById("gallery")

const res=await fetch("/projects/projects.json")
const projects=await res.json()

projects.forEach(p=>{

const card=document.createElement("a")
card.className="card"
card.href=p.link

card.innerHTML=`

<div class="image">

<img src="${p.image}" alt="${p.name}">

<div class="logo">
<img src="${p.image}">
</div>

</div>

<div class="content">
<div class="title">${p.name}</div>
<div class="desc">${p.desc}</div>
</div>

`

gallery.appendChild(card)

})

}

loadProjects()

</script>

</body>
</html>
