<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Projects</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&family=Geist+Mono&display=swap" rel="stylesheet">

<style>

:root{
--bg:#0a0a0b;
--text:#f4f4f5;
--muted:#a1a1aa;
--border:#1f1f23;
}

*{box-sizing:border-box}

body{
margin:0;
font-family:Geist,system-ui;
background:var(--bg);
color:var(--text);
}

/* grid background */

body::before{
content:"";
position:fixed;
inset:0;
background-image:
linear-gradient(rgba(255,255,255,.035) 1px, transparent 1px),
linear-gradient(90deg, rgba(255,255,255,.035) 1px, transparent 1px);
background-size:44px 44px;
z-index:-1;
}

/* page container */

.container{
max-width:1200px;
margin:auto;
padding:60px 24px;
}

/* header */

.header{
display:flex;
align-items:center;
gap:16px;
margin-bottom:50px;
}

/* rounded box logo */

.logo{
width:46px;
height:46px;
border-radius:14px;
background:#151517;
border:1px solid var(--border);
display:flex;
align-items:center;
justify-content:center;
font-family:"Geist Mono";
font-size:14px;
}

/* title */

.title{
font-size:34px;
font-weight:600;
letter-spacing:-.5px;
}

.subtitle{
color:var(--muted);
font-family:"Geist Mono";
font-size:13px;
margin-top:4px;
}

/* gallery grid */

.gallery{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
gap:22px;
}

/* project card */

.project{
position:relative;
border-radius:16px;
overflow:hidden;
border:1px solid var(--border);
background:#111113;
cursor:pointer;
transition:all .25s ease;
}

.project:hover{
transform:translateY(-6px);
box-shadow:0 15px 45px rgba(0,0,0,.6);
}

/* image */

.project img{
width:100%;
height:200px;
object-fit:cover;
display:block;
transition:transform .35s ease;
}

.project:hover img{
transform:scale(1.08);
}

/* overlay */

.overlay{
position:absolute;
inset:0;
background:linear-gradient(to top, rgba(0,0,0,.7), transparent 60%);
display:flex;
flex-direction:column;
justify-content:flex-end;
padding:18px;
}

/* text */

.name{
font-size:18px;
font-weight:500;
}

.desc{
font-size:13px;
color:#d4d4d8;
margin-top:4px;
line-height:1.4;
}

/* footer */

footer{
margin-top:60px;
text-align:center;
color:var(--muted);
font-family:"Geist Mono";
font-size:12px;
}

</style>

</head>
<body>

<div class="container">

<div class="header">

<div class="logo">
WG
</div>

<div>
<div class="title">Projects</div>
<div class="subtitle">gallery of experiments</div>
</div>

</div>

<div id="gallery" class="gallery"></div>

<footer>
loaded from /projects/projects.json
</footer>

</div>

<script>

async function loadProjects(){

const gallery=document.getElementById("gallery")

const res=await fetch("/projects/projects.json")
const data=await res.json()

data.forEach(p=>{

const card=document.createElement("a")
card.className="project"
card.href=p.link

card.innerHTML=`

<img src="${p.image}" alt="${p.name}">

<div class="overlay">
<div class="name">${p.name}</div>
<div class="desc">${p.desc}</div>
</div>

`

gallery.appendChild(card)

})

}

loadProjects()

</script>

</body>
</html>
