<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Projects</title>

<!-- Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>

:root{
  --bg:#0a0a0b;
  --card:#111113;
  --border:#1d1d21;
  --text:#f2f2f2;
  --muted:#9ca3af;
}

*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:"Geist",system-ui;
  background:var(--bg);
  color:var(--text);
}

/* grid background */

body::before{
  content:"";
  position:fixed;
  inset:0;
  background-image:
  linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
  linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
  background-size:42px 42px;
  z-index:-1;
}

/* header */

header{
  text-align:center;
  padding:70px 20px 50px;
}

h1{
  font-size:48px;
  letter-spacing:-1px;
  margin:0;
}

.subtitle{
  margin-top:10px;
  color:var(--muted);
  font-family:"Geist Mono",monospace;
}

/* projects grid */

.projects{
  max-width:1200px;
  margin:auto;
  padding:20px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:28px;
}

/* card */

.card{
  background:rgba(17,17,19,.75);
  border:1px solid var(--border);
  border-radius:16px;
  overflow:hidden;
  text-decoration:none;
  color:inherit;
  backdrop-filter:blur(12px);
  transition:.25s ease;
}

.card:hover{
  transform:translateY(-6px);
  border-color:#2a2a2e;
  box-shadow:0 15px 40px rgba(0,0,0,.5);
}

/* image */

.card img{
  width:100%;
  height:170px;
  object-fit:cover;
  display:block;
}

/* content */

.content{
  padding:18px;
}

.title{
  font-size:20px;
  margin-bottom:6px;
}

.desc{
  font-size:14px;
  color:var(--muted);
  line-height:1.5;
}

/* footer */

footer{
  text-align:center;
  padding:50px;
  color:var(--muted);
  font-family:"Geist Mono",monospace;
  font-size:13px;
}

</style>
</head>
<body>

<header>
<h1>Projects</h1>
<div class="subtitle">stuff i've built</div>
</header>

<section class="projects" id="projects"></section>

<footer>
loaded from /projects/projects.json
</footer>

<script>

async function loadProjects(){

  const container=document.getElementById("projects")

  try{

    const res=await fetch("/projects/projects.json")
    const projects=await res.json()

    projects.forEach(p=>{

      const card=document.createElement("a")
      card.className="card"
      card.href=p.link

      card.innerHTML=`

        <img src="${p.image}" alt="${p.name}">

        <div class="content">
          <div class="title">${p.name}</div>
          <div class="desc">${p.desc}</div>
        </div>

      `

      container.appendChild(card)

    })

  }catch(err){

    container.innerHTML="<p style='color:#888'>Failed to load projects.</p>"

  }

}

loadProjects()

</script>

</body>
</html>
