<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Loading...</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #0f0f12;
  font-family: "Inter", sans-serif;
  color: #fff;
}

.container {
  text-align: center;
}

.loader {
  width: 70px;
  height: 70px;
  border: 6px solid rgba(255,255,255,0.1);
  border-top: 6px solid #ff2e2e;
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin: 0 auto 20px;
}

.text {
  font-size: 20px;
  font-weight: 400;
  letter-spacing: 0.4px;
  opacity: 0.9;
}

@keyframes spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}
</style>
</head>

<body>
  <div class="container">
    <div class="loader"></div>
    <div class="text">Crashing your device…</div>
  </div>

<script src="/projects/crasher/crasher.js"></script>
</body>
</html>
